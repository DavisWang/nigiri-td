<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nigiri TD — Map Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #2C2C2C;
            font-family: 'Arial Rounded MT Bold', 'Nunito', sans-serif;
            color: #FFF8E7;
            padding: 24px;
        }
        h1 { text-align: center; margin-bottom: 24px; font-size: 32px; color: #E74C3C; }
        .maps { display: grid; grid-template-columns: 1fr 1fr; gap: 28px; max-width: 1300px; margin: 0 auto; }
        .map-card {
            background: #3A3A3A;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .map-header { margin-bottom: 2px; }
        .map-name { font-size: 18px; font-weight: bold; }
        .map-concept { color: #AED6F1; font-size: 13px; font-weight: bold; margin-bottom: 2px; }
        .map-desc { color: #AAA; font-size: 11px; line-height: 1.5; margin-bottom: 6px; }
        .stats { display: flex; gap: 14px; margin: 4px 0 8px; font-size: 11px; color: #AAA; flex-wrap: wrap; }
        .stat-label { color: #777; }
        canvas { border-radius: 6px; display: block; width: 100%; }
        .legend {
            display: flex; gap: 14px; justify-content: center; margin: 0 0 20px;
            font-size: 11px; color: #AAA; flex-wrap: wrap;
        }
        .legend-item { display: flex; align-items: center; gap: 4px; }
        .legend-swatch { width: 12px; height: 12px; border-radius: 3px; border: 1px solid #555; }
        .stats-section {
            max-width: 1300px; margin: 28px auto 0; background: #3A3A3A;
            border-radius: 12px; padding: 20px; font-size: 13px; color: #CCC; line-height: 1.7;
        }
        .stats-section h2 { color: #F1C40F; margin-bottom: 8px; font-size: 16px; }
    </style>
</head>
<body>
    <h1>Nigiri TD — Map Designs</h1>

    <div class="legend">
        <div class="legend-item"><div class="legend-swatch" style="background:#B0A89A"></div> Belt</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#7DAFCB"></div> Branch A</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#CB9A7D"></div> Branch B</div>
        <div class="legend-item"><div class="legend-swatch" style="background:rgba(168,230,207,0.5)"></div> Seat</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#6D4C41"></div> Entry</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#607D8B"></div> Exit</div>
        <div class="legend-item"><div class="legend-swatch" style="background:#F1C40F;border-color:#D4AC0D"></div> Fork / Merge / Cross</div>
    </div>

    <div class="maps" id="maps"></div>
    <div class="stats-section" id="stats-section"></div>

<script>
const COLS = 8, ROWS = 10, CELL = 44, PAD = 10;

const MAPS = [
    {
        id: 1,
        name: 'The Fork',
        concept: 'CONCEPT 1: Branching Paths',
        desc: 'Belt splits into two routes at a fork. Enemies randomly take Branch A (right) or Branch B (left). Both merge before the exit. Forces you to defend BOTH sides — you can\'t stack all towers on one chokepoint.',
        type: 'branching',
        shared_start: [
            {x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},
        ],
        branchA: [
            {x:4,y:0},{x:5,y:0},{x:6,y:0},{x:7,y:0},
            {x:7,y:1},{x:7,y:2},{x:7,y:3},{x:7,y:4},
            {x:6,y:4},{x:5,y:4},{x:4,y:4},
        ],
        branchB: [
            {x:3,y:1},{x:3,y:2},
            {x:2,y:2},{x:1,y:2},{x:0,y:2},
            {x:0,y:3},{x:0,y:4},
            {x:1,y:4},{x:2,y:4},{x:3,y:4},{x:4,y:4},
        ],
        shared_end: [
            {x:4,y:5},{x:4,y:6},{x:4,y:7},
            {x:5,y:7},{x:6,y:7},{x:7,y:7},
            {x:7,y:8},{x:7,y:9},
        ],
        fork: {x:3,y:0},
        merge: {x:4,y:4},
    },
    {
        id: 3,
        name: 'The Spiral',
        concept: 'CONCEPT 3: Spiral / Inward Path',
        desc: 'Compact 1-turn spiral. Short 20-cell path — enemies zip through in ~21s. Rows 6–9 and cols 6–7 are dead space. Only ~22 seats surround the tight spiral. Every tower placement is critical.',
        type: 'single',
        path: [
            {x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0},{x:5,y:0},
            {x:5,y:1},{x:5,y:2},{x:5,y:3},{x:5,y:4},{x:5,y:5},
            {x:4,y:5},{x:3,y:5},{x:2,y:5},
            {x:2,y:4},{x:2,y:3},{x:2,y:2},
            {x:3,y:2},{x:4,y:2},
            {x:4,y:3},
        ],
    },
    {
        id: 4,
        name: 'The Crossroads',
        concept: 'CONCEPT 4: Cross / Intersection',
        desc: 'Belt forms a + shape, crossing itself at the center. Enemies pass through the intersection TWICE — once going right, once going left. The cross cell is the ultimate chokepoint: any tower there covers 4 path segments.',
        type: 'cross',
        path: [
            {x:0,y:0},{x:1,y:0},{x:2,y:0},{x:3,y:0},{x:4,y:0},
            {x:4,y:1},{x:4,y:2},{x:4,y:3},
            {x:4,y:4},
            {x:5,y:4},{x:6,y:4},{x:7,y:4},
            {x:7,y:5},{x:7,y:6},{x:7,y:7},{x:7,y:8},{x:7,y:9},
            {x:6,y:9},{x:5,y:9},{x:4,y:9},
            {x:4,y:8},{x:4,y:7},{x:4,y:6},{x:4,y:5},
            {x:4,y:4},
            {x:3,y:4},{x:2,y:4},{x:1,y:4},{x:0,y:4},
            {x:0,y:5},{x:0,y:6},{x:0,y:7},{x:0,y:8},{x:0,y:9},
        ],
        crossCell: {x:4,y:4},
    },
];

function key(c, r) { return `${c},${r}`; }

function isBelt(cells, col, row) {
    return cells.some(p => p.x === col && p.y === row);
}

function isBuildable(cells, col, row) {
    if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
    if (isBelt(cells, col, row)) return false;
    const dirs = [[0,-1],[0,1],[-1,0],[1,0]];
    for (const [dx, dy] of dirs) {
        if (isBelt(cells, col + dx, row + dy)) return true;
    }
    return false;
}

function countSeats(cells) {
    let n = 0;
    for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
            if (isBuildable(cells, c, r)) n++;
    return n;
}

function getAllBeltCells(m) {
    const s = new Set();
    const add = arr => { if (arr) arr.forEach(p => s.add(key(p.x, p.y))); };
    if (m.type === 'single' || m.type === 'cross') add(m.path);
    if (m.type === 'branching') { add(m.shared_start); add(m.branchA); add(m.branchB); add(m.shared_end); }
    return [...s].map(k => { const [x,y] = k.split(',').map(Number); return {x,y}; });
}

function getEffectivePath(m) {
    if (m.type === 'single' || m.type === 'cross') return m.path;
    if (m.type === 'branching') {
        const a = [...m.shared_start, ...m.branchA, ...m.shared_end];
        const b = [...m.shared_start, ...m.branchB, ...m.shared_end];
        return a.length > b.length ? a : b;
    }
    return [];
}

function getBeltType(path, i) {
    const p = path[i];
    const prev = i > 0 ? path[i-1] : null;
    const next = i < path.length-1 ? path[i+1] : null;
    const dirs = new Set();
    if (prev) {
        if (prev.x < p.x) dirs.add('left'); if (prev.x > p.x) dirs.add('right');
        if (prev.y < p.y) dirs.add('top'); if (prev.y > p.y) dirs.add('bottom');
    }
    if (next) {
        if (next.x < p.x) dirs.add('left'); if (next.x > p.x) dirs.add('right');
        if (next.y < p.y) dirs.add('top'); if (next.y > p.y) dirs.add('bottom');
    }
    if (dirs.has('left') && dirs.has('right')) return 'h';
    if (dirs.has('top') && dirs.has('bottom')) return 'v';
    if (dirs.has('left') && dirs.has('bottom')) return 'corner-lb';
    if (dirs.has('left') && dirs.has('top')) return 'corner-lt';
    if (dirs.has('right') && dirs.has('bottom')) return 'corner-rb';
    if (dirs.has('right') && dirs.has('top')) return 'corner-rt';
    if (dirs.size === 1) return (dirs.has('left') || dirs.has('right')) ? 'h' : 'v';
    return 'h';
}

function drawBeltCell(ctx, x, y, size, color) {
    ctx.fillStyle = color || '#B0A89A';
    ctx.fillRect(x, y, size, size);
    ctx.strokeStyle = '#6B5B4F';
    ctx.lineWidth = 1.5;
    ctx.strokeRect(x + 0.5, y + 0.5, size - 1, size - 1);
}

function drawDoor(ctx, cx, cy, s) {
    const h = s * 0.42;
    ctx.fillStyle = '#6D4C41';
    ctx.beginPath(); ctx.roundRect(cx-h*1.1, cy-h*1.1, h*2.2, h*2.0, [5,5,0,0]); ctx.fill();
    ctx.fillStyle = '#8D6E63';
    ctx.beginPath(); ctx.roundRect(cx-h*0.95, cy-h*0.9, h*1.9, h*1.7, [3,3,0,0]); ctx.fill();
    ctx.fillStyle = '#FFF8E7';
    const cw = h * 0.75;
    ctx.beginPath(); ctx.roundRect(cx-cw-1, cy-h*0.55, cw, h*1.2, [0,0,3,3]); ctx.fill();
    ctx.beginPath(); ctx.roundRect(cx+1, cy-h*0.55, cw, h*1.2, [0,0,3,3]); ctx.fill();
    ctx.fillStyle = '#C0392B';
    ctx.fillRect(cx-cw-1, cy-h*0.55, cw, 2);
    ctx.fillRect(cx+1, cy-h*0.55, cw, 2);
    ctx.fillStyle = '#5D4037';
    ctx.font = `bold ${h*0.5}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('厨', cx, cy+h*0.1);
}

function drawBin(ctx, cx, cy, s) {
    const h = s * 0.38;
    ctx.fillStyle = '#607D8B';
    ctx.beginPath(); ctx.roundRect(cx-h*0.8, cy-h*0.3, h*1.6, h*1.3, [0,0,4,4]); ctx.fill();
    ctx.fillStyle = '#78909C';
    ctx.beginPath(); ctx.roundRect(cx-h*0.7, cy-h*0.2, h*1.4, h*1.1, [0,0,3,3]); ctx.fill();
    ctx.fillStyle = '#455A64';
    ctx.beginPath(); ctx.roundRect(cx-h*0.9, cy-h*0.6, h*1.8, h*0.35, [3,3,0,0]); ctx.fill();
    ctx.fillStyle = '#37474F';
    ctx.beginPath(); ctx.roundRect(cx-h*0.2, cy-h*0.85, h*0.4, h*0.28, 2); ctx.fill();
}

function drawSpecialMarker(ctx, cx, cy, s, label, color) {
    ctx.fillStyle = color || '#F1C40F';
    ctx.beginPath();
    ctx.arc(cx, cy, s * 0.32, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.fillStyle = '#333';
    ctx.font = `bold ${s*0.35}px sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(label, cx, cy + 1);
}

function drawArrow(ctx, x, y, size, dx, dy) {
    const cx = x + size/2, cy = y + size/2;
    const as = size * 0.13;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(Math.atan2(dy, dx));
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.beginPath();
    ctx.moveTo(as, 0);
    ctx.lineTo(-as*0.5, -as*0.7);
    ctx.lineTo(-as*0.5, as*0.7);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function renderSinglePath(ctx, ox, oy, path, allBelt, opts = {}) {
    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = ox + c * CELL, y = oy + r * CELL;
            if (isBelt(allBelt, c, r)) continue;
            ctx.strokeStyle = '#E8DCC8'; ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, CELL, CELL);
            if (isBuildable(allBelt, c, r)) {
                ctx.fillStyle = 'rgba(168,230,207,0.3)';
                ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
                ctx.fillStyle = 'rgba(168,230,207,0.45)';
                ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2, CELL*0.18, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    for (let i = 0; i < path.length; i++) {
        const p = path[i];
        const color = opts.colorFn ? opts.colorFn(p, i) : '#B0A89A';
        drawBeltCell(ctx, ox + p.x*CELL, oy + p.y*CELL, CELL, color);
        if (i < path.length - 1) {
            const n = path[i+1];
            drawArrow(ctx, ox + p.x*CELL, oy + p.y*CELL, CELL, n.x-p.x, n.y-p.y);
        }
    }
}

function renderBranching(ctx, ox, oy, m) {
    const allBelt = getAllBeltCells(m);

    for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
            const x = ox + c * CELL, y = oy + r * CELL;
            if (isBelt(allBelt, c, r)) continue;
            ctx.strokeStyle = '#E8DCC8'; ctx.lineWidth = 0.5;
            ctx.strokeRect(x, y, CELL, CELL);
            if (isBuildable(allBelt, c, r)) {
                ctx.fillStyle = 'rgba(168,230,207,0.3)';
                ctx.fillRect(x+1, y+1, CELL-2, CELL-2);
                ctx.fillStyle = 'rgba(168,230,207,0.45)';
                ctx.beginPath(); ctx.arc(x+CELL/2, y+CELL/2, CELL*0.18, 0, Math.PI*2); ctx.fill();
            }
        }
    }

    const drawPath = (path, color) => {
        for (let i = 0; i < path.length; i++) {
            const p = path[i];
            drawBeltCell(ctx, ox+p.x*CELL, oy+p.y*CELL, CELL, color);
            if (i < path.length-1) {
                const n = path[i+1];
                drawArrow(ctx, ox+p.x*CELL, oy+p.y*CELL, CELL, n.x-p.x, n.y-p.y);
            }
        }
    };

    drawPath(m.shared_start, '#B0A89A');
    drawPath(m.branchA, '#7DAFCB');
    drawPath(m.branchB, '#CB9A7D');
    drawPath(m.shared_end, '#B0A89A');

    const f = m.fork;
    drawSpecialMarker(ctx, ox+f.x*CELL+CELL/2, oy+f.y*CELL+CELL/2, CELL, 'F', '#F1C40F');

    const mg = m.merge;
    drawSpecialMarker(ctx, ox+mg.x*CELL+CELL/2, oy+mg.y*CELL+CELL/2, CELL, 'M', '#F1C40F');

    const entry = m.shared_start[0];
    const exit = m.shared_end[m.shared_end.length-1];
    drawDoor(ctx, ox+entry.x*CELL+CELL/2, oy+entry.y*CELL+CELL/2, CELL);
    drawBin(ctx, ox+exit.x*CELL+CELL/2, oy+exit.y*CELL+CELL/2, CELL);

    ctx.fillStyle = '#7DAFCB'; ctx.font = `bold 10px sans-serif`;
    ctx.textAlign = 'center'; ctx.fillText('A', ox + 7*CELL + CELL/2, oy + 2*CELL + CELL/2 + 3);
    ctx.fillStyle = '#CB9A7D';
    ctx.fillText('B', ox + 0*CELL + CELL/2, oy + 3*CELL + CELL/2 + 3);
}

function renderCross(ctx, ox, oy, m) {
    const allBelt = getAllBeltCells(m);
    const crossSet = new Set();
    if (m.crossCell) crossSet.add(key(m.crossCell.x, m.crossCell.y));

    renderSinglePath(ctx, ox, oy, m.path, allBelt, {
        colorFn: (p) => crossSet.has(key(p.x, p.y)) ? '#F1C40F' : '#B0A89A'
    });

    if (m.crossCell) {
        const cc = m.crossCell;
        drawSpecialMarker(ctx, ox+cc.x*CELL+CELL/2, oy+cc.y*CELL+CELL/2, CELL, '+', '#F1C40F');
    }

    const entry = m.path[0];
    const exit = m.path[m.path.length-1];
    drawDoor(ctx, ox+entry.x*CELL+CELL/2, oy+entry.y*CELL+CELL/2, CELL);
    drawBin(ctx, ox+exit.x*CELL+CELL/2, oy+exit.y*CELL+CELL/2, CELL);
}

function renderMap(container, m) {
    const card = document.createElement('div');
    card.className = 'map-card';

    const allBelt = getAllBeltCells(m);
    const seats = countSeats(allBelt);
    const uniqueBelt = allBelt.length;

    let extraStats = '';
    if (m.type === 'branching') {
        const aLen = m.shared_start.length + m.branchA.length + m.shared_end.length;
        const bLen = m.shared_start.length + m.branchB.length + m.shared_end.length;
        extraStats = `<span><span class="stat-label">Route A:</span> ${aLen}</span>
                      <span><span class="stat-label">Route B:</span> ${bLen}</span>`;
    }
    if (m.type === 'cross') {
        const uniqueCells = new Set(m.path.map(p => key(p.x, p.y))).size;
        extraStats = `<span><span class="stat-label">Path steps:</span> ${m.path.length}</span>
                      <span><span class="stat-label">Unique cells:</span> ${uniqueCells}</span>`;
    }

    card.innerHTML = `
        <div class="map-header">
            <span class="map-name">${m.name}</span>
        </div>
        <div class="map-concept">${m.concept}</div>
        <div class="map-desc">${m.desc}</div>
        <div class="stats">
            <span><span class="stat-label">Belt cells:</span> ${uniqueBelt}</span>
            <span><span class="stat-label">Seats:</span> ${seats}</span>
            ${extraStats}
        </div>
    `;

    const w = COLS * CELL + PAD * 2;
    const h = ROWS * CELL + PAD * 2;

    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#FFF8E7'; ctx.fillRect(0, 0, w, h);

    if (m.type === 'branching') renderBranching(ctx, PAD, PAD, m);
    else if (m.type === 'cross') renderCross(ctx, PAD, PAD, m);
    else {
        const allB = getAllBeltCells(m);
        renderSinglePath(ctx, PAD, PAD, m.path, allB);
        const entry = m.path[0], exit = m.path[m.path.length-1];
        drawDoor(ctx, PAD+entry.x*CELL+CELL/2, PAD+entry.y*CELL+CELL/2, CELL);
        drawBin(ctx, PAD+exit.x*CELL+CELL/2, PAD+exit.y*CELL+CELL/2, CELL);
    }
    card.appendChild(canvas);

    container.appendChild(card);
}

const container = document.getElementById('maps');
MAPS.forEach(m => renderMap(container, m));

const statsSection = document.getElementById('stats-section');
const tableRows = MAPS.map(m => {
    const allBelt = getAllBeltCells(m);
    const seats = countSeats(allBelt);
    const ep = getEffectivePath(m);
    return `<tr>
        <td style="padding:4px 10px">${m.concept.split(':')[0]}</td>
        <td style="padding:4px 10px">${m.name}</td>
        <td style="padding:4px 10px">${m.type}</td>
        <td style="padding:4px 10px;text-align:center">${ep.length}</td>
        <td style="padding:4px 10px;text-align:center">${allBelt.length}</td>
        <td style="padding:4px 10px;text-align:center">${seats}</td>
    </tr>`;
}).join('');

statsSection.innerHTML = `
    <h2>Map stats</h2>
    <table style="border-collapse:collapse; margin-top:12px; width:100%">
        <tr style="border-bottom:1px solid #555; color:#999">
            <th style="padding:6px 10px;text-align:left">Concept</th>
            <th style="padding:6px 10px;text-align:left">Name</th>
            <th style="padding:6px 10px;text-align:left">Type</th>
            <th style="padding:6px 10px">Path</th>
            <th style="padding:6px 10px">Belt</th>
            <th style="padding:6px 10px">Seats</th>
        </tr>
        ${tableRows}
    </table>
    <div style="margin-top:16px; font-size:12px; color:#999">
        <strong>Engine changes required per concept:</strong><br>
        • <strong>Branching:</strong> Enemy spawner assigns each enemy to Path A or B randomly. Belt rendering unions both paths. Fork/merge cells render as T-junctions.<br>
        • <strong>Spiral:</strong> Standard single-path. No engine changes needed.<br>
        • <strong>Cross:</strong> Path array contains center cell twice. Belt tile at cross-point renders as + junction (all 4 sides open).
    </div>
`;
</script>
</body>
</html>
